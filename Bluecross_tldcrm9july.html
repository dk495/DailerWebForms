<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blurecross TLD Transfer Check</title>
  <!-- Bootstrap 4.3 + FontAwesome -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .container {
      background-color: #ffffff;
      padding: 40px 35px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      max-width: 560px;
      margin-top: 4rem;
      margin-bottom: 2rem;
    }
    h2 {
      color: #007bff;
      margin-bottom: 25px;
      font-weight: 500;
    }
    .form-control {
      border-radius: 50px;
      padding-left: 20px;
      height: 52px;
      font-size: 1.1rem;
    }
    .form-control:focus {
      box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
      border-color: #80bdff;
    }
    .btn-primary {
      border-radius: 50px;
      background-color: #007bff;
      border-color: #007bff;
      padding: 12px 35px;
      font-weight: 500;
      font-size: 1.1rem;
      transition: all 0.15s;
    }
    .btn-primary:hover {
      background-color: #0056b3;
      border-color: #0056b3;
      transform: scale(1.02);
    }
    .btn-primary:active {
      transform: scale(0.97);
    }
    .alert {
      margin-top: 25px;
      border-radius: 50px;
      padding: 14px 24px;
      font-weight: 500;
    }
    .badge-transfer {
      display: inline-block;
      padding: 12px 32px;
      border-radius: 50px;
      font-size: 1.3rem;
      font-weight: 600;
      margin-top: 10px;
      letter-spacing: 0.3px;
    }
    .badge-transfer-green {
      background-color: #28a745;
      color: white;
      box-shadow: 0 2px 8px rgba(40, 167, 69, 0.3);
    }
    .badge-transfer-red {
      background-color: #dc3545;
      color: white;
      box-shadow: 0 2px 8px rgba(220, 53, 69, 0.3);
    }
    .badge-transfer-gray {
      background-color: #6c757d;
      color: white;
    }
    .spinner-border-sm {
      width: 1.3rem;
      height: 1.3rem;
      border-width: 0.2em;
    }
    #transferStatusContainer {
      min-height: 70px;
    }
    .text-muted small {
      font-size: 85%;
    }
    .lead {
      font-weight: 400;
    }
    .form-group label {
      font-weight: 500;
      color: #333;
    }
    /* hide the old alert container if empty */
    #alertContainer .alert {
      border-radius: 30px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 class="text-center"><i class="fas fa-phone-alt text-primary mr-2"></i>Bluecross TLD CRM Transfer Check</h2>
  <p class="text-center text-muted lead">Enter phone number to check eligibility</p>

  <form id="phoneForm" novalidate>
    <div class="form-group">
      <label for="caller_id">Phone number (e.g. 7026435297)</label>
      <input type="text" class="form-control" id="caller_id" placeholder="Enter phone number" required autofocus>
    </div>
    <div class="text-center mt-4">
      <button type="submit" class="btn btn-primary btn-lg px-5" id="submitBtn">
        <i class="fas fa-search mr-2"></i>Check
      </button>
    </div>
  </form>

  <!-- dedicated transfer status display (below button) -->
  <div id="transferStatusContainer" class="mt-3 text-center"></div>

  <!-- alert container for messages (success/error) -->
  <div id="alertContainer"></div>
</div>

<!-- Bootstrap JS dependencies -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

<script>
  (function() {
    'use strict';

    // Helper: show transfer status (green/red) based on API response (1 or 0)
    function showTransferStatus(apiResponse) {
      const container = document.getElementById('transferStatusContainer');
      container.innerHTML = '';

      let badgeHtml = '';
      if (apiResponse === 1) {
        badgeHtml = `<div class="badge-transfer badge-transfer-green"><i class="fas fa-check-circle mr-2"></i>You Can Transfer</div>`;
      } else if (apiResponse === 0) {
        badgeHtml = `<div class="badge-transfer badge-transfer-red"><i class="fas fa-times-circle mr-2"></i>Donot Transfer</div>`;
      } else {
        // fallback (should never happen with valid API)
        badgeHtml = `<div class="badge-transfer badge-transfer-gray"><i class="fas fa-minus-circle mr-2"></i>Unknown status</div>`;
      }
      container.innerHTML = badgeHtml;
    }

    // Main submit handler – only phone number needed
    document.getElementById('phoneForm').addEventListener('submit', function(event) {
      event.preventDefault();

      const phoneInput = document.getElementById('caller_id');
      const phone = phoneInput.value.trim();

      // basic validation
      if (!phone) {
        const alertContainer = document.getElementById('alertContainer');
        alertContainer.innerHTML = `<div class="alert alert-danger" role="alert"><i class="fas fa-exclamation-triangle mr-2"></i>Phone number is required.</div>`;
        return;
      }

      // Clear previous alerts and transfer status
      document.getElementById('alertContainer').innerHTML = '';
      document.getElementById('transferStatusContainer').innerHTML = '';

      // Build the API URL with the phone number
      const rawUrl = `https://enrollppi.tldcrm.com/api/public/dialer/ready/${phone}?fpg=CLIENTS,ECLIENTS`;
      const proxyUrl = `https://api.formifyweb.com/proxify.php?url=${encodeURIComponent(rawUrl)}`;

      const alertContainer = document.getElementById('alertContainer');
      alertContainer.innerHTML = `<div class="alert alert-info" role="alert"><i class="fas fa-spinner fa-spin mr-2"></i>Checking transfer eligibility ...</div>`;

      // Call the transfer API via proxy
      fetch(proxyUrl, {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
      })
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.text(); // read as text (plain "1" or "0")
      })
      .then(responseBody => {
        const trimmed = responseBody.trim();
        let parsedValue;

        // try to parse as JSON, but spec says plain 1/0; handle both
        try {
          const json = JSON.parse(trimmed);
          if (typeof json === 'object' && json !== null) {
            // if object, try to find status/ready/value
            if ('status' in json) parsedValue = Number(json.status);
            else if ('ready' in json) parsedValue = Number(json.ready);
            else if ('value' in json) parsedValue = Number(json.value);
            else parsedValue = Number(json);
          } else {
            parsedValue = Number(json);
          }
        } catch (e) {
          // not JSON: treat as plain number string
          parsedValue = Number(trimmed);
        }

        if (isNaN(parsedValue)) {
          parsedValue = 0; // fallback
        }

        // Show green/red status
        showTransferStatus(parsedValue);

        // Also show a success alert with the numeric status
        let statusMsg = (parsedValue === 1) ? '✅ Transfer allowed (1)' : (parsedValue === 0 ? '⛔ Transfer not allowed (0)' : '⚠️ Unexpected response');
        alertContainer.innerHTML = `<div class="alert alert-success" role="alert"><i class="fas fa-check-circle mr-2"></i>API responded: ${statusMsg}</div>`;
      })
      .catch(error => {
        console.error('Transfer API error:', error);
        alertContainer.innerHTML = `<div class="alert alert-danger" role="alert"><i class="fas fa-exclamation-circle mr-2"></i>Error: ${error.message}</div>`;
        // show red fallback
        document.getElementById('transferStatusContainer').innerHTML = `<div class="badge-transfer badge-transfer-red"><i class="fas fa-times-circle mr-2"></i>Donot Transfer (error)</div>`;
      });
    });

    // disable right-click (as in original snippet)
    document.addEventListener("contextmenu", function (e) {
      e.preventDefault();
    });

  })();
</script>
</body>
</html>
