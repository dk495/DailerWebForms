<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB Client Portal · three forms</title>
    <!-- Font Awesome 6 (free) for clean icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f5fe 0%, #e9eff7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .portal-card {
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 20, 40, 0.35), 0 4px 18px 0 rgba(0,0,0,0.06);
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255,255,255,0.6);
            transition: all 0.2s ease;
        }

        /* heading style */
        h1 {
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #13294e;        /* deep navy — professional */
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            border-left: 7px solid #2d7ee9;
            padding-left: 1.5rem;
        }

        h1 i {
            color: #2d7ee9;
            font-size: 2.8rem;
            background: rgba(45, 126, 233, 0.1);
            padding: 0.4rem;
            border-radius: 1.2rem;
        }

        .subhead {
            font-size: 1.1rem;
            color: #2c3d5f;
            margin: 0 0 2.2rem 2rem;
            font-weight: 400;
            border-bottom: 1px dashed #a2bedf;
            padding-bottom: 0.75rem;
            display: inline-block;
        }

        /* grid for three buttons */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8rem;
            margin: 2.5rem 0 1rem;
        }

        /* big beautiful cards */
        .portal-btn {
            background: white;
            border: none;
            border-radius: 2.2rem;
            padding: 2.2rem 1rem 2rem;
            text-decoration: none;
            color: #13294e;
            font-weight: 550;
            font-size: 1.8rem;
            box-shadow: 0 15px 30px -10px rgba(18, 52, 77, 0.15);
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            border: 2px solid rgba(255,255,255,0.9);
            cursor: pointer;
            line-height: 1.3;
            text-align: center;
            backdrop-filter: blur(4px);
            will-change: transform, box-shadow;
        }

        .portal-btn i {
            font-size: 3.4rem;
            margin-bottom: 0.2rem;
            filter: drop-shadow(0 4px 5px rgba(0,35,70,0.15));
        }

        /* individual brand colors */
        .btn-windows {
            background: linear-gradient(145deg, #ffffff, #f3f9ff);
            border-bottom: 6px solid #00a1b0;
        }
        .btn-windows i { color: #008a9a; }

        .btn-roofing {
            background: linear-gradient(145deg, #ffffff, #fef5ea);
            border-bottom: 6px solid #c24f0e;
        }
        .btn-roofing i { color: #b34a1a; }

        .btn-bathroom {
            background: linear-gradient(145deg, #ffffff, #f0f6ff);
            border-bottom: 6px solid #2a6f97;
        }
        .btn-bathroom i { color: #1e5a83; }

        .portal-btn:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 45px -15px rgba(0, 45, 85, 0.3);
            border-color: rgba(255,255,255,0.95);
        }

        .portal-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px #0b2b4e;
            transition: 0.05s;
        }

        /* labels inside button */
        .btn-label {
            display: block;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .small-hint {
            font-size: 0.95rem;
            opacity: 0.7;
            font-weight: 400;
            margin-top: 0.2rem;
            background: rgba(0,0,0,0.02);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            color: #2d4059;
        }

        /* additional info / footer */
        .info-note {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            color: #2f4858;
            font-size: 0.95rem;
            background: rgba(255,255,255,0.55);
            padding: 1rem 1.8rem;
            border-radius: 80px;
            backdrop-filter: blur(4px);
            border: 1px solid white;
            flex-wrap: wrap;
        }

        .info-note i {
            color: #1f6e8c;
            font-size: 1.1rem;
        }

        .info-note a {
            color: #0f3b5e;
            font-weight: 500;
            text-decoration: none;
            border-bottom: 1px dotted #5f8bb3;
        }

        .info-note a:hover {
            border-bottom: 2px solid #1d5a9c;
        }

        /* responsive: stack on mobile */
        @media (max-width: 650px) {
            .button-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            h1 { font-size: 2.4rem; padding-left: 1rem; }
            .portal-card { padding: 1.5rem; }
            .portal-btn { padding: 1.5rem; flex-direction: row; justify-content: left; }
            .portal-btn i { font-size: 2.5rem; margin: 0 0.5rem 0 1rem; }
            .btn-label { font-size: 1.7rem; }
            .small-hint { display: none; } /* hide hint on very small to keep clean */
        }

        /* extra touch: animated background gradient */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(99,179,237,0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        /* open external links styling (same window) */
        .portal-btn {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="portal-card">
    
    <!-- main heading: WB Client Portal -->
    <h1>
        <i class="fas fa-folder-open" style="background: none; padding: 0;"></i> 
        WB Client Portal
    </h1>
    <div class="subhead">
        <i class="fas fa-pen" style="margin-right: 0.4rem; opacity: 0.7;"></i> select a service form
    </div>

    <!-- three big button grid - each redirects to respective link (same tab) -->
    <div class="button-grid">
        
        <!-- Windows button -->
        <a href="http://forms.formifyweb.com/wbclient_windows.html" class="portal-btn btn-windows" target="_self">
            <i class="fas fa-window-maximize"></i>
            <span class="btn-label">Windows</span>
            <span class="small-hint"><i class="far fa-arrow-alt-circle-right"></i> open form</span>
        </a>

        <!-- Roofing button -->
        <a href="http://forms.formifyweb.com/wbclient_roofing.html" class="portal-btn btn-roofing" target="_self">
            <i class="fas fa-home"></i>
            <span class="btn-label">Roofing</span>
            <span class="small-hint"><i class="far fa-arrow-alt-circle-right"></i> open form</span>
        </a>

        <!-- Bathroom button -->
        <a href="http://forms.formifyweb.com/wbclient_bathroom.html" class="portal-btn btn-bathroom" target="_self">
            <i class="fas fa-toilet"></i>
            <span class="btn-label">Bathroom</span>
            <span class="small-hint"><i class="far fa-arrow-alt-circle-right"></i> open form</span>
        </a>
    </div>

    <!-- subtle footer with direct links (optional but user friendly) -->
    <div class="info-note">
        <i class="fas fa-shield-alt"></i>
        <span>Direct access: </span>
        <a href="http://forms.formifyweb.com/wbclient_windows.html" target="_self">Windows</a> 
        <span>•</span>
        <a href="http://forms.formifyweb.com/wbclient_roofing.html" target="_self">Roofing</a>
        <span>•</span>
        <a href="http://forms.formifyweb.com/wbclient_bathroom.html" target="_self">Bathroom</a>
        <span>  |  click any button above</span>
    </div>
    
    <!-- tiny note: same window behaviour (no new tab) -->
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #3c5777;">
        <i class="fas fa-mouse-pointer" style="margin-right: 0.2rem;"></i> WB Client Portal 
    </div>
</div>

<!-- (no extra javascript needed, pure HTML anchor buttons) -->

</body>
</html>
